openapi: 3.1.0
info:
  title: Orders API
  version: "1.0.0"
  description: Example of the conventions in this skill — plural nouns, accurate status codes, cursor pagination, consistent envelope.
servers:
  - url: https://api.example.com/v1
paths:
  /orders:
    get:
      summary: List orders
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [open, paid, refunded] } }
        - { name: sort, in: query, schema: { type: string, example: "-created_at" } }
        - { name: limit, in: query, schema: { type: integer, default: 20, maximum: 100 } }
        - { name: cursor, in: query, schema: { type: string } }
      responses:
        "200":
          description: A page of orders
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrderList" }
        "401": { $ref: "#/components/responses/Error" }
    post:
      summary: Create an order
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrderInput" }
      responses:
        "201":
          description: Created
          headers:
            Location: { schema: { type: string }, description: URL of the new order }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrderEnvelope" }
        "422": { $ref: "#/components/responses/Error" }
  /orders/{id}:
    get:
      summary: Get one order
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The order
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrderEnvelope" }
        "404": { $ref: "#/components/responses/Error" }
components:
  responses:
    Error:
      description: Standard error envelope
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  schemas:
    Order:
      type: object
      properties:
        id: { type: string }
        status: { type: string, enum: [open, paid, refunded] }
        total: { type: number }
        created_at: { type: string, format: date-time }
    OrderInput:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { type: object, properties: { product_id: { type: string }, quantity: { type: integer } } }
    Meta:
      type: object
      properties:
        nextCursor: { type: string, nullable: true }
        limit: { type: integer }
        hasMore: { type: boolean }
    OrderList:
      type: object
      properties:
        data: { type: array, items: { $ref: "#/components/schemas/Order" } }
        meta: { $ref: "#/components/schemas/Meta" }
        error: { type: object, nullable: true }
    OrderEnvelope:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Order" }
        error: { type: object, nullable: true }
    ErrorEnvelope:
      type: object
      properties:
        data: { nullable: true }
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: array, items: { type: object } }
            requestId: { type: string }
